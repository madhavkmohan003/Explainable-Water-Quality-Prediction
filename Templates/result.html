<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Quality Result</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 420px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 15px;
        }

        .result {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .explanation {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.5;
            max-height: 150px;
            overflow-y: auto;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #6cb2eb;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #4c8dd8;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Water Quality Prediction</h1>

        <div class="result">
            <strong>Prediction:</strong> {{prediction}}
        </div>

        <div class="explanation">
            <strong>Explanation:</strong><br>
            {{explanation}}
        </div>

        <a href="/" class="btn">Go Back</a>
    </div>
</body>
</html>
